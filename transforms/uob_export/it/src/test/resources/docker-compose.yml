services:
  # Minio to emulate cloud object storage (ie. s3) for local development
  minio:
    image: minio/minio:RELEASE.2023-06-09T07-32-12Z
    # override minio entrypoint to create 'test' bucket as top-level directory
    entrypoint: >
      /bin/sh -c "
      mkdir -p /data/test/;
      minio server /data --address 0.0.0.0:9000 --console-address 0.0.0.0:9090
      "
    ports:
      # s3 object storage api port
      - 9000:9000
